# ─────────────────────────────────────────────────────────────────────────────
# Supabase CLI Configuration
# Docs: https://supabase.com/docs/guides/local-development
#
# Usage:
#   supabase login
#   supabase link --project-ref <your-project-ref>
#   supabase db push              # apply migrations to remote
#   supabase db pull              # pull remote schema
#   supabase start                # start local Supabase stack
# ─────────────────────────────────────────────────────────────────────────────

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Max file size for Supabase Storage (not R2 — we use R2 for all file storage)
file_size_limit = "50MiB"

[auth]
enabled = true
# JWT secret — must match SUPABASE_JWT_SECRET in your .env
# site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
